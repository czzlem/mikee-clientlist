     FIREBASE SETUP — read this before opening the file in a browser
     ====================================================================
     1. Go to https://console.firebase.google.com → Add project (free).
     2. In your new project: Build → Firestore Database → Create database
        → Start in PRODUCTION mode → pick any region → Enable.
     3. Go to Firestore → Rules tab and replace the rules with:

          rules_version = '2';
          service cloud.firestore {
            match /databases/{database}/documents {
              match /{document=**} {
                allow read, write: if true;
              }
            }
          }

        (This makes the data open to anyone with your config below —
        fine for a small shared tool between trusted people, but do not
        put highly sensitive data in it.)
     4. In Project settings (gear icon) → General → "Your apps" →
        click the </> (web) icon → register app → copy the
        firebaseConfig object it gives you.
     5. Paste it below, replacing the placeholder values.
     6. Also set CRM_PASSCODE below to whatever word/phrase you want
        people to type before they can see the client list. This is

        page's source code can read the passcode. Don't rely on it to
        protect sensitive data; it just keeps casual visitors out.
     ==================================================================== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBkMg_iVFbjRpUpDYhfwFFBomgPKO1hq3Y",
  authDomain: "mikee-client-list.firebaseapp.com",
  projectId: "mikee-client-list",
  storageBucket: "mikee-client-list.firebasestorage.app",
  messagingSenderId: "244027138664",
  appId: "1:244027138664:web:2a01bc91edec07940851dd",
  measurementId: "G-YDK72S0D1M"
};

  // Change this to your own passcode before deploying.
  window.CRM_PASSCODE = "bball213";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const clientsDocRef = doc(db, "crm", "clients");

  // Expose a minimal storage-like API so the rest of the app's code
  // doesn't need to change.
  window.crmStorage = {
    async get() {
      const snap = await getDoc(clientsDocRef);
      if (!snap.exists()) return null;
      return { value: snap.data().value };
    },
    async set(value) {
      await setDoc(clientsDocRef, { value });
      return { value };
    }
  };
  window.crmStorageReady = true;
</script>
<style>

<body>
<div id="app"></div>

<script>
(function() {
  let clients = [];
  let loaded = false;
  let loadError = false;
  let searchTerm = '';
  let statusFilter = 'all';
  let sortBy = 'name';
  let openClientId = null;
  let editDraft = null;
  let confirmingDelete = false;
  let saving = false;
  let unlocked = false;
  let gateError = '';

  const GATE_SESSION_KEY = 'crm_unlocked';

  function checkGateOnLoad() {
    try {
      if (sessionStorage.getItem(GATE_SESSION_KEY) === 'true') {
        unlocked = true;
      }
    } catch (e) {
      // sessionStorage unavailable; fall back to asking every load
    }
  }

  function renderGate() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="gate-wrap">
        <div class="gate-card">
          <h1 class="gate-title">Client Ledger</h1>
          <div class="gate-sub">Enter the passcode to view this client list.</div>
          <div class="gate-error">${gateError}</div>
          <input type="password" id="gateInput" placeholder="Passcode" autofocus>
          <button class="gate-submit" id="gateSubmit">Unlock</button>
        </div>
      </div>
    `;
    const input = document.getElementById('gateInput');
    const submit = document.getElementById('gateSubmit');
    const tryUnlock = () => {
      const val = input.value;
      const expected = window.CRM_PASSCODE;
      if (typeof expected !== 'string' || !expected || expected === 'changeme') {
        gateError = 'No passcode has been set up for this page yet. See the setup comment near the top of the HTML file.';
        renderGate();
        return;
      }
      if (val === expected) {
        unlocked = true;
        gateError = '';
        try { sessionStorage.setItem(GATE_SESSION_KEY, 'true'); } catch (e) {}
        render();
      } else {
        gateError = "That passcode didn't work — try again.";
        renderGate();
        const freshInput = document.getElementById('gateInput');
        if (freshInput) freshInput.focus();
      }
    };
    submit.onclick = tryUnlock;
    input.onkeydown = (e) => { if (e.key === 'Enter') tryUnlock(); };
    input.focus();
  }

  function uid() {
    return 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  }

  function emptyClient() {
    return {
      id: uid(),
      name: '',
      phone: '',
      email: '',
      status: 'prospective',
      lastContacted: '',
      prequalAmount: '',
      notes: '',
      showings: []
    };
  }

  async function waitForStorageReady(timeoutMs = 8000) {
    const start = Date.now();
    while (!window.crmStorageReady) {
      if (Date.now() - start > timeoutMs) return false;
      await new Promise(r => setTimeout(r, 50));
    }
    return true;
  }

  async function loadClients() {
    const ready = await waitForStorageReady();
    if (!ready) {
      loadError = true;
      loaded = true;
      render();
      return;
    }
    try {
      const res = await window.crmStorage.get();
      clients = res && res.value ? JSON.parse(res.value) : [];
      loadError = false;
    } catch (e) {
      clients = [];
      loadError = true;
    }
    loaded = true;
    render();
  }

  async function persist() {
    saving = true;
    try {
      await window.crmStorage.set(JSON.stringify(clients));
      loadError = false;
    } catch (e) {
      loadError = true;
    }
    saving = false;
    render();
  }

  function fmtMoney(val) {
    if (val === '' || val === null || val === undefined) return '—';
    const num = Number(val);
    if (isNaN(num)) return '—';
    return '$' + num.toLocaleString('en-US');
  }

  function fmtDate(dstr) {
    if (!dstr) return 'Never';
    const d = new Date(dstr + 'T00:00:00');
    if (isNaN(d.getTime())) return dstr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function daysSince(dstr) {
    if (!dstr) return Infinity;
    const d = new Date(dstr + 'T00:00:00');
    if (isNaN(d.getTime())) return Infinity;
    return Math.floor((Date.now() - d.getTime()) / (1000*60*60*24));
  }

  function statusLabel(s) {
    return { active: 'Active', prospective: 'Prospective', past: 'Past Client' }[s] || s;
  }

  function escapeHtml(str) {
    if (str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function getFilteredSorted() {
    let list = clients.slice();
    if (statusFilter !== 'all') list = list.filter(c => c.status === statusFilter);
    if (searchTerm.trim()) {
      const t = searchTerm.trim().toLowerCase();
      list = list.filter(c =>
        (c.name||'').toLowerCase().includes(t) ||
        (c.email||'').toLowerCase().includes(t) ||
        (c.phone||'').toLowerCase().includes(t) ||
        (c.notes||'').toLowerCase().includes(t)
      );
    }
    if (sortBy === 'name') {
      list.sort((a,b) => (a.name||'').localeCompare(b.name||''));
    } else if (sortBy === 'recent') {
      list.sort((a,b) => daysSince(a.lastContacted) - daysSince(b.lastContacted));
    } else if (sortBy === 'stale') {
      list.sort((a,b) => daysSince(b.lastContacted) - daysSince(a.lastContacted));
    } else if (sortBy === 'prequal') {
      list.sort((a,b) => (Number(b.prequalAmount)||0) - (Number(a.prequalAmount)||0));
    }
    return list;
  }

  function render() {
    if (!unlocked) {
      renderGate();
      return;
    }
    const app = document.getElementById('app');
    const counts = {
      all: clients.length,
      active: clients.filter(c=>c.status==='active').length,
      prospective: clients.filter(c=>c.status==='prospective').length,
      past: clients.filter(c=>c.status==='past').length
    };

    let html = '';

    html += `<div class="ledger-header">
      <div>
        <h1 class="ledger-title">Client Ledger</h1>
        <div class="ledger-sub">${clients.length} client${clients.length===1?'':'s'} on file · shared list — synced for anyone using this Firebase project</div>
      </div>
      <button class="new-client-btn" id="btnNew">+ New Client</button>
    </div>`;

    if (!loaded) {
      html += `<div class="loading-banner">Loading your client ledger…</div>`;
      app.innerHTML = html;
      return;
    }
    if (loadError) {
      html += `<div class="error-banner">Couldn't connect to the database. If you just downloaded this file, make sure you've pasted your Firebase config into the HTML — see the setup comment near the top of the file.</div>`;
    }

    html += `<div class="stats-strip">
      <div class="stat-card"><div class="stat-num">${counts.active}</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-num">${counts.prospective}</div><div class="stat-label">Prospective</div></div>
      <div class="stat-card"><div class="stat-num">${counts.past}</div><div class="stat-label">Past Clients</div></div>
      <div class="stat-card"><div class="stat-num">${clients.reduce((s,c)=>s+(c.showings?c.showings.length:0),0)}</div><div class="stat-label">Showings Logged</div></div>
    </div>`;

    html += `<div class="controls-row">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search name, email, phone, notes…" value="${escapeHtml(searchTerm)}">
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="name" ${sortBy==='name'?'selected':''}>Sort: Name</option>
        <option value="stale" ${sortBy==='stale'?'selected':''}>Sort: Needs follow-up</option>
        <option value="recent" ${sortBy==='recent'?'selected':''}>Sort: Recently contacted</option>
        <option value="prequal" ${sortBy==='prequal'?'selected':''}>Sort: Prequalified amount</option>
      </select>
    </div>`;

    html += `<div class="status-filters">
      <button class="status-filter-btn ${statusFilter==='all'?'active-all':''}" data-filter="all">All (${counts.all})</button>
      <button class="status-filter-btn ${statusFilter==='active'?'active-active':''}" data-filter="active">Active (${counts.active})</button>
      <button class="status-filter-btn ${statusFilter==='prospective'?'active-prospective':''}" data-filter="prospective">Prospective (${counts.prospective})</button>
      <button class="status-filter-btn ${statusFilter==='past'?'active-past':''}" data-filter="past">Past (${counts.past})</button>
    </div>`;

    const list = getFilteredSorted();

    if (list.length === 0) {
      html += `<div class="empty-state">
        <div class="empty-state-title">${clients.length === 0 ? 'No clients yet' : 'No matches'}</div>
        <div>${clients.length === 0 ? 'Add your first client to start the ledger.' : 'Try a different search or filter.'}</div>
      </div>`;
    } else {
      html += `<div class="client-grid">`;
      list.forEach(c => {
        const stale = daysSince(c.lastContacted) >= 14;
        const showingsCount = c.showings ? c.showings.length : 0;
        html += `<div class="client-card" tabindex="0" data-id="${c.id}">
          <div class="card-top">
            <h3 class="client-name">${escapeHtml(c.name) || '(Unnamed)'}</h3>
            <span class="stamp stamp-${c.status}">${statusLabel(c.status)}</span>
          </div>
          <div class="card-meta">
            <div class="card-meta-row"><span class="card-meta-label">Phone</span><span>${escapeHtml(c.phone) || '—'}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">Email</span><span>${escapeHtml(c.email) || '—'}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">Last contact</span><span class="${stale?'last-contacted-stale':''}">${fmtDate(c.lastContacted)}${stale && c.lastContacted ? ' ⚠' : ''}</span></div>
          </div>
          <div class="card-divider"></div>
          <div class="card-bottom-row">
            <span class="prequal-amount">${fmtMoney(c.prequalAmount)}</span>
            <span class="showings-count">${showingsCount} house${showingsCount===1?'':'s'} shown</span>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    // Modal
    if (openClientId !== null) {
      const isNew = openClientId === 'new';
      const c = editDraft;
      html += `<div class="overlay" id="overlay">
        <div class="modal" id="modalBox">
          <div class="modal-header">
            <h2 class="modal-title">${isNew ? 'New Client' : 'Edit Client'}</h2>
            <button class="icon-btn" id="btnClose" aria-label="Close">✕</button>
          </div>
          <div class="modal-body">
            <div class="field-group">
              <label class="field-label">Name</label>
              <input type="text" id="f_name" value="${escapeHtml(c.name)}" placeholder="Jordan Reyes">
            </div>
            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Phone</label>
                <input type="tel" id="f_phone" value="${escapeHtml(c.phone)}" placeholder="(555) 012-3456">
              </div>
              <div class="field-group">
                <label class="field-label">Email</label>
                <input type="email" id="f_email" value="${escapeHtml(c.email)}" placeholder="jordan@email.com">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Status</label>
              <div class="status-toggle-group">
                <button type="button" class="status-toggle ${c.status==='active'?'sel-active':''}" data-status="active">Active</button>
                <button type="button" class="status-toggle ${c.status==='prospective'?'sel-prospective':''}" data-status="prospective">Prospective</button>
                <button type="button" class="status-toggle ${c.status==='past'?'sel-past':''}" data-status="past">Past Client</button>
              </div>
            </div>
            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Last Contacted</label>
                <input type="date" id="f_lastContacted" value="${escapeHtml(c.lastContacted)}">
              </div>
              <div class="field-group">
                <label class="field-label">Prequalified Amount ($)</label>
                <input type="number" id="f_prequal" value="${escapeHtml(c.prequalAmount)}" placeholder="450000" min="0" step="1000">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Notes</label>
              <textarea id="f_notes" placeholder="Preferences, family details, timeline, anything worth remembering…">${escapeHtml(c.notes)}</textarea>
            </div>

            <div class="section-title">Houses Shown</div>
            <div class="showings-list" id="showingsList">
              ${(c.showings||[]).map((s, idx) => `
                <div class="showing-row" data-idx="${idx}">
                  <input type="text" class="showing-address" placeholder="123 Maple St" value="${escapeHtml(s.address)}">
                  <input type="date" class="showing-date" value="${escapeHtml(s.date)}">
                  <button class="showing-remove" data-remove-idx="${idx}" aria-label="Remove showing">✕</button>
                </div>
              `).join('')}
            </div>
            <button class="add-showing-btn" id="btnAddShowing">+ Add house shown</button>

            ${confirmingDelete ? `
              <div class="confirm-box">
                Delete this client permanently? This can't be undone.
                <div class="confirm-box-actions">
                  <button class="confirm-btn-yes" id="btnConfirmDelete">Delete</button>
                  <button class="confirm-btn-no" id="btnCancelDelete">Cancel</button>
                </div>
              </div>
            ` : ''}

            <div class="modal-footer">
              ${!isNew ? `<button class="delete-btn" id="btnDelete">Delete client</button>` : `<span></span>`}
              <button class="save-btn" id="btnSave">${saving ? 'Saving…' : 'Save'}</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    app.innerHTML = html;
    attachHandlers();
  }

  function openModal(id) {
    confirmingDelete = false;
    if (id === 'new') {
      editDraft = emptyClient();
      openClientId = 'new';
    } else {
      const c = clients.find(x => x.id === id);
      if (!c) return;
      editDraft = JSON.parse(JSON.stringify(c));
      openClientId = id;
    }
    render();
  }

  function closeModal() {
    openClientId = null;
    editDraft = null;
    confirmingDelete = false;
    render();
  }

  function readDraftFromForm() {
    editDraft.name = document.getElementById('f_name').value;
    editDraft.phone = document.getElementById('f_phone').value;
    editDraft.email = document.getElementById('f_email').value;
    editDraft.lastContacted = document.getElementById('f_lastContacted').value;
    editDraft.prequalAmount = document.getElementById('f_prequal').value;
    editDraft.notes = document.getElementById('f_notes').value;
    const rows = document.querySelectorAll('#showingsList .showing-row');
    const showings = [];
    rows.forEach(row => {
      const addr = row.querySelector('.showing-address').value;
      const date = row.querySelector('.showing-date').value;
      showings.push({ address: addr, date: date });
    });
    editDraft.showings = showings;
  }

  function attachHandlers() {
    const btnNew = document.getElementById('btnNew');
    if (btnNew) btnNew.onclick = () => openModal('new');

    document.querySelectorAll('.client-card').forEach(card => {
      card.onclick = () => openModal(card.dataset.id);
      card.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(card.dataset.id); } };
    });

    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.oninput = (e) => {
        searchTerm = e.target.value;
        const cursorPos = e.target.selectionStart;
        render();
        const newInput = document.getElementById('searchInput');
        if (newInput) {
          newInput.focus();
          newInput.setSelectionRange(cursorPos, cursorPos);
        }
      };
    }

    const sortSelect = document.getElementById('sortSelect');
    if (sortSelect) sortSelect.onchange = (e) => { sortBy = e.target.value; render(); };

    document.querySelectorAll('.status-filter-btn').forEach(btn => {
      btn.onclick = () => { statusFilter = btn.dataset.filter; render(); };
    });

    const overlay = document.getElementById('overlay');
    if (overlay) {
      overlay.onclick = (e) => { if (e.target.id === 'overlay') closeModal(); };
    }
    const btnClose = document.getElementById('btnClose');
    if (btnClose) btnClose.onclick = closeModal;

    document.querySelectorAll('.status-toggle').forEach(btn => {
      btn.onclick = () => {
        readDraftFromForm();
        editDraft.status = btn.dataset.status;
        render();
      };
    });

    const btnAddShowing = document.getElementById('btnAddShowing');
    if (btnAddShowing) {
      btnAddShowing.onclick = () => {
        readDraftFromForm();
        editDraft.showings.push({ address: '', date: '' });
        render();
        const inputs = document.querySelectorAll('#showingsList .showing-address');
        if (inputs.length) inputs[inputs.length-1].focus();
      };
    }

    document.querySelectorAll('[data-remove-idx]').forEach(btn => {
      btn.onclick = () => {
        readDraftFromForm();
        const idx = parseInt(btn.dataset.removeIdx, 10);
        editDraft.showings.splice(idx, 1);
        render();
      };
    });

    const btnSave = document.getElementById('btnSave');
    if (btnSave) {
      btnSave.onclick = async () => {
        readDraftFromForm();
        if (!editDraft.name.trim()) {
          editDraft.name = editDraft.name.trim();
          alert('Please enter a client name.');
          return;
        }
        const idx = clients.findIndex(c => c.id === editDraft.id);
        if (idx >= 0) {
          clients[idx] = editDraft;
        } else {
          clients.push(editDraft);
        }
        closeModal();
        await persist();
      };
    }

    const btnDelete = document.getElementById('btnDelete');
    if (btnDelete) btnDelete.onclick = () => { confirmingDelete = true; render(); };

    const btnCancelDelete = document.getElementById('btnCancelDelete');
    if (btnCancelDelete) btnCancelDelete.onclick = () => { confirmingDelete = false; render(); };

    const btnConfirmDelete = document.getElementById('btnConfirmDelete');
    if (btnConfirmDelete) {
      btnConfirmDelete.onclick = async () => {
        clients = clients.filter(c => c.id !== editDraft.id);
        closeModal();
        await persist();
      };
    }
  }

  checkGateOnLoad();
  loadClients();
})();
</script>
</body>
</html>
